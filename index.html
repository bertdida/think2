<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="think2 runs an eight-round strategy debate between two AI models on your brief (three strategist defense passes), then synthesizes a verdict and action list. Bring your OpenRouter API key — it stays in your browser."
    />
    <meta name="robots" content="index,follow" />
    <meta name="theme-color" content="#f4f3f0" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#141414" media="(prefers-color-scheme: dark)" />
    <link rel="canonical" href="https://think2.xyz/" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://think2.xyz/" />
    <meta property="og:title" content="think2 — multi-round strategy debate" />
    <meta
      property="og:description"
      content="think2 runs an eight-round strategy debate between two AI models on your brief (three strategist defense passes), then synthesizes a verdict and action list. Bring your OpenRouter API key — it stays in your browser."
    />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="think2 — multi-round strategy debate" />
    <meta
      name="twitter:description"
      content="Multi-round AI strategy debate (three defenses) plus synthesized verdict. Your OpenRouter key never leaves the browser."
    />
    <title>think2 — multi-round strategy debate</title>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "think2",
        "url": "https://think2.xyz/",
        "description": "Strategy tool: two AI models debate your brief over eight rounds including three strategist defense passes, then a synthesizer produces a verdict and key actions. Uses your OpenRouter API key in the browser only.",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Web browser",
        "browserRequirements": "Requires JavaScript. User-supplied OpenRouter API key.",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    </script>
    <style>
      :root {
        --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", "Courier New", monospace;
        --bg: #f4f3f0;
        --surface: #ffffff;
        --border: #e0ddd6;
        --strategist: #1d4ed8;
        --critic: #b91c1c;
        --synthesis: #a16207;
        --text: #171717;
        --muted: #5c5c5c;
        --card-bg: #ffffff;
        --content-max: 42rem;
        --content-pad-x: 24px;
        --link: #1548a8;
        --timeline-axis: 13px;
        --focus-border: #b8b3a8;
        --focus-shadow: 0 0 0 2px rgba(23, 23, 23, 0.06);
        --focus-shadow-strong: 0 0 0 2px rgba(23, 23, 23, 0.08);
        --btn-start-hover-bg: #2a2a2a;
        --btn-start-hover-border: #2a2a2a;
        --outline-hover-border: #c4beb2;
        --api-key-hover-bg: rgba(23, 23, 23, 0.06);
        --api-key-focus-ring: 0 0 0 2px rgba(23, 23, 23, 0.12);
        --model-tag-s-bg: rgba(29, 78, 216, 0.08);
        --model-tag-c-bg: rgba(185, 28, 28, 0.08);
        --model-tag-y-bg: rgba(161, 98, 7, 0.1);
        --synthesis-card-bg: #faf8f4;
        --round-badge-bg: rgba(255, 255, 255, 0.6);
        --card-body-color: #2f2f2f;
        --synthesis-body-color: #3a3428;
        --error-bg: #fdf2f2;
        --error-border: #e8c4c4;
        --error-text: #991b1b;
        --error-inline: #b91c1c;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #141414;
          --surface: #1c1c1c;
          --border: #333333;
          --text: #ececec;
          --muted: #9ca3af;
          --card-bg: #1c1c1c;
          --link: #93c5fd;
          --strategist: #60a5fa;
          --critic: #f87171;
          --synthesis: #fbbf24;
          --focus-border: #6b7280;
          --focus-shadow: 0 0 0 2px rgba(255, 255, 255, 0.08);
          --focus-shadow-strong: 0 0 0 2px rgba(255, 255, 255, 0.1);
          --btn-start-hover-bg: #d4d4d4;
          --btn-start-hover-border: #d4d4d4;
          --outline-hover-border: #525252;
          --api-key-hover-bg: rgba(255, 255, 255, 0.08);
          --api-key-focus-ring: 0 0 0 2px rgba(255, 255, 255, 0.16);
          --model-tag-s-bg: rgba(96, 165, 250, 0.15);
          --model-tag-c-bg: rgba(248, 113, 113, 0.14);
          --model-tag-y-bg: rgba(251, 191, 36, 0.14);
          --synthesis-card-bg: #1f1d16;
          --round-badge-bg: rgba(255, 255, 255, 0.06);
          --card-body-color: #d4d4d4;
          --synthesis-body-color: #e7e5df;
          --error-bg: #2a1518;
          --error-border: #7f1d1d;
          --error-text: #fca5a5;
          --error-inline: #f87171;
        }
      }

      html {
        color-scheme: light dark;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body,
      button,
      input,
      select,
      textarea {
        font-family: var(--font-mono);
      }

      body {
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        padding: 0;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
      }

      .site-header {
        width: 100%;
        border-bottom: 1px solid var(--border);
      }

      .header-inner {
        max-width: var(--content-max);
        margin: 0 auto;
        padding: 32px var(--content-pad-x) 24px;
        display: flex;
        flex-wrap: wrap;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px 16px;
      }

      .site-header h1 {
        font-weight: 500;
        font-size: clamp(1.35rem, 2.8vw, 1.65rem);
        letter-spacing: -0.03em;
        color: var(--text);
        line-height: 1.2;
      }

      .header-github {
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--link);
        text-decoration: none;
        text-underline-offset: 3px;
        border-radius: 2px;
      }

      .header-github:hover {
        text-decoration: underline;
        color: var(--text);
      }

      .header-github:focus {
        outline: none;
      }

      .header-github:focus-visible {
        box-shadow: var(--focus-shadow-strong);
      }

      .container {
        max-width: var(--content-max);
        margin: 0 auto;
        padding: 40px var(--content-pad-x) 80px;
      }

      .setup-panel {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 2px;
        padding: 28px 28px 32px;
        margin-bottom: 40px;
      }

      .setup-panel h2 {
        font-size: 1.05rem;
        font-weight: 600;
        letter-spacing: -0.02em;
        text-transform: none;
        color: var(--text);
        margin-bottom: 1.25rem;
      }

      .field {
        margin-bottom: 1.1rem;
      }

      .field label {
        display: block;
        font-size: 0.8125rem;
        font-weight: 500;
        letter-spacing: 0;
        text-transform: none;
        color: var(--muted);
        margin-bottom: 0.35rem;
      }

      .field input,
      .field textarea,
      .field select {
        width: 100%;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 2px;
        color: var(--text);
        font-size: 0.875rem;
        padding: 10px 12px;
        outline: none;
        transition:
          border-color 0.15s ease,
          box-shadow 0.15s ease;
        resize: vertical;
      }

      .field input:focus,
      .field textarea:focus,
      .field select:focus {
        border-color: var(--focus-border);
        box-shadow: var(--focus-shadow);
      }

      .field input[type="password"] {
        letter-spacing: 0.1em;
      }

      .field textarea {
        min-height: 120px;
        line-height: 1.6;
      }

      .field select option {
        background: var(--surface);
        color: var(--text);
      }

      .models-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }

      .model-tag {
        font-size: 0.65rem;
        letter-spacing: 0.04em;
        padding: 4px 8px;
        border-radius: 2px;
        display: inline-block;
        margin-top: 6px;
      }

      .model-tag.s {
        background: var(--model-tag-s-bg);
        color: var(--strategist);
      }
      .model-tag.c {
        background: var(--model-tag-c-bg);
        color: var(--critic);
      }
      .model-tag.y {
        background: var(--model-tag-y-bg);
        color: var(--synthesis);
      }

      .btn-start {
        width: 100%;
        margin-top: 10px;
        padding: 12px 16px;
        background: var(--text);
        color: var(--bg);
        border: 1px solid var(--text);
        border-radius: 2px;
        font-weight: 500;
        font-size: 0.875rem;
        letter-spacing: 0;
        text-transform: none;
        cursor: pointer;
        transition:
          background 0.15s ease,
          color 0.15s ease,
          opacity 0.15s ease;
      }

      .btn-start:hover {
        background: var(--btn-start-hover-bg);
        border-color: var(--btn-start-hover-border);
        color: var(--bg);
      }
      .btn-start:active {
        opacity: 0.92;
      }
      .btn-start:disabled {
        opacity: 0.35;
        cursor: not-allowed;
      }

      .brief-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 8px;
      }

      .brief-action {
        font-family: inherit;
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--text);
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 2px;
        padding: 6px 12px;
        cursor: pointer;
        transition:
          background 0.15s ease,
          border-color 0.15s ease;
      }

      .brief-action:hover {
        background: var(--bg);
        border-color: var(--outline-hover-border);
      }

      .brief-action:focus {
        outline: none;
      }

      .brief-action:focus-visible {
        border-color: var(--focus-border);
        box-shadow: var(--focus-shadow-strong);
      }

      .api-key-wrap {
        position: relative;
        width: 100%;
      }

      .api-key-wrap input {
        width: 100%;
        box-sizing: border-box;
        padding-right: 2.75rem;
      }

      .api-key-toggle {
        position: absolute;
        z-index: 1;
        right: 4px;
        top: 50%;
        transform: translateY(-50%);
        width: 2.125rem;
        height: 2.125rem;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        border: none;
        border-radius: 2px;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        transition:
          background 0.15s ease,
          color 0.15s ease;
      }

      .api-key-toggle:hover {
        background: var(--api-key-hover-bg);
        color: var(--text);
      }

      .api-key-toggle:focus {
        outline: none;
      }

      .api-key-toggle:focus-visible {
        box-shadow: var(--api-key-focus-ring);
      }

      .api-key-toggle svg {
        display: block;
        flex-shrink: 0;
      }

      .timeline {
        display: flex;
        flex-direction: column;
        gap: 0;
      }

      .round-card {
        display: none;
        opacity: 0;
        transform: translateY(12px);
        transition:
          opacity 0.4s ease,
          transform 0.4s ease;
        position: relative;
        padding-left: 30px;
        margin-bottom: 0;
      }

      .round-card.visible {
        display: block;
      }

      .round-card.animated {
        opacity: 1;
        transform: translateY(0);
      }

      .round-card::before {
        content: "";
        position: absolute;
        left: var(--timeline-axis);
        top: 36px;
        bottom: -24px;
        width: 1px;
        transform: translateX(-50%);
        background: var(--border);
      }

      .round-card:last-child::before {
        display: none;
      }

      .round-card::after {
        content: "";
        position: absolute;
        left: var(--timeline-axis);
        top: 18px;
        width: 10px;
        height: 10px;
        box-sizing: border-box;
        border-radius: 50%;
        border: 2px solid var(--border);
        background: var(--surface);
        transform: translateX(-50%);
      }

      .round-card.strategist::after {
        border-color: var(--strategist);
        background: var(--strategist);
      }
      .round-card.critic::after {
        border-color: var(--critic);
        background: var(--critic);
      }
      .round-card.synthesis::after {
        border-color: var(--synthesis);
        background: var(--synthesis);
      }

      .card-inner {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 2px;
        padding: 20px 22px;
        margin-bottom: 24px;
      }

      .round-card.strategist .card-inner {
        border-left: 3px solid var(--strategist);
      }
      .round-card.critic .card-inner {
        border-left: 3px solid var(--critic);
      }
      .round-card.synthesis .card-inner {
        border-left: 3px solid var(--synthesis);
        background: var(--synthesis-card-bg);
      }

      .card-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 14px;
      }

      .speaker-label {
        font-weight: 600;
        font-size: 0.8125rem;
        letter-spacing: -0.02em;
      }

      .round-card.strategist .speaker-label {
        color: var(--strategist);
      }
      .round-card.critic .speaker-label {
        color: var(--critic);
      }
      .round-card.synthesis .speaker-label {
        color: var(--synthesis);
      }

      .round-badge {
        font-size: 0.65rem;
        letter-spacing: 0.02em;
        text-transform: none;
        color: var(--muted);
        padding: 2px 6px;
        border: 1px solid var(--border);
        border-radius: 2px;
        background: var(--round-badge-bg);
      }

      .typing-indicator {
        display: inline-flex;
        gap: 4px;
        align-items: center;
        margin-left: auto;
      }

      .typing-indicator span {
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: var(--muted);
        animation: pulse 1.2s infinite;
      }

      .typing-indicator span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .typing-indicator span:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes pulse {
        0%,
        60%,
        100% {
          opacity: 0.3;
          transform: scale(0.8);
        }
        30% {
          opacity: 1;
          transform: scale(1);
        }
      }

      .card-content {
        font-size: 0.875rem;
        line-height: 1.7;
        color: var(--card-body-color);
        white-space: pre-wrap;
        word-break: break-word;
      }

      .card-content .stream-text {
        white-space: inherit;
      }

      .round-card.synthesis .card-content {
        color: var(--synthesis-body-color);
      }

      .stream-error {
        color: var(--error-inline);
      }

      .round-usage {
        margin-top: 12px;
        padding-top: 10px;
        border-top: 1px solid var(--border);
        font-size: 0.7rem;
        line-height: 1.5;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
      }

      .round-usage .usage-model {
        display: block;
        margin-bottom: 4px;
        word-break: break-all;
      }

      .session-usage {
        margin-top: 20px;
        padding: 12px 14px;
        border: 1px solid var(--border);
        border-radius: 2px;
        background: var(--surface);
        font-size: 0.75rem;
        line-height: 1.5;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
      }

      .session-usage strong {
        color: var(--text);
        font-weight: 600;
      }

      .cursor {
        display: inline-block;
        width: 2px;
        height: 1em;
        background: currentColor;
        margin-left: 2px;
        vertical-align: text-bottom;
        animation: blink 0.8s step-end infinite;
      }

      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }

      .btn-reset {
        display: none;
        margin: 32px auto 0;
        padding: 10px 20px;
        background: var(--surface);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 2px;
        font-size: 0.8125rem;
        letter-spacing: 0;
        text-transform: none;
        cursor: pointer;
        transition:
          background 0.15s ease,
          border-color 0.15s ease;
      }

      .btn-reset:hover {
        background: var(--bg);
        border-color: var(--outline-hover-border);
      }

      .error-msg {
        background: var(--error-bg);
        border: 1px solid var(--error-border);
        border-radius: 2px;
        padding: 12px 14px;
        font-size: 0.8125rem;
        color: var(--error-text);
        margin-top: 16px;
        display: none;
      }

      .key-warning {
        font-size: 0.75rem;
        color: var(--muted);
        margin-top: 0.35rem;
        letter-spacing: 0;
        line-height: 1.45;
      }

      .site-footer {
        max-width: var(--content-max);
        margin: 0 auto;
        padding: 0 var(--content-pad-x) 48px;
        font-size: 0.8125rem;
        color: var(--muted);
        line-height: 1.55;
        text-align: center;
      }

      .site-footer a {
        color: var(--link);
        text-decoration: underline;
        text-underline-offset: 3px;
      }

      .site-footer a:hover {
        color: var(--text);
      }

      @media (max-width: 600px) {
        :root {
          --content-pad-x: 16px;
        }
        .header-inner {
          padding-top: 20px;
        }
        .container {
          padding: 20px var(--content-pad-x) 60px;
        }
        .models-row {
          grid-template-columns: 1fr;
        }
        .setup-panel {
          padding: 20px;
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <h1>think2</h1>
        <a
          class="header-github"
          href="https://github.com/bertdida/think2"
          target="_blank"
          rel="noopener noreferrer"
          >GitHub</a>
      </div>
    </header>

    <main class="container" id="main">
      <section
        class="setup-panel"
        id="setupPanel"
        aria-labelledby="setup-heading"
      >
        <h2 id="setup-heading">Session setup</h2>
        <form id="councilForm" onsubmit="return false">
          <div class="field">
            <label for="apiKey">OpenRouter API key</label>
            <div class="api-key-wrap">
              <input
                type="password"
                id="apiKey"
                name="apiKey"
                placeholder="sk-or-..."
                autocomplete="off"
                spellcheck="false"
              />
              <button
                type="button"
                class="api-key-toggle"
                id="btnApiKeyToggle"
                aria-pressed="false"
                aria-label="Show API key as plain text"
                title="Show key"
              ></button>
            </div>
            <p class="key-warning">
              Used only in this tab for OpenRouter. Not saved — gone after reload.
            </p>
          </div>

          <div class="models-row">
            <div class="field">
              <label for="strategistModel">Strategist model</label>
              <select id="strategistModel" name="strategistModel"></select>
              <div class="model-tag s">Strategist</div>
            </div>
            <div class="field">
              <label for="criticModel">Critic model</label>
              <select id="criticModel" name="criticModel"></select>
              <div class="model-tag c">Critic</div>
            </div>
          </div>

          <div class="field">
            <label for="synthesizerModel">Synthesizer model</label>
            <select id="synthesizerModel" name="synthesizerModel"></select>
            <div class="model-tag y">Final round — verdict</div>
          </div>

          <div class="field">
            <label for="brief">Your brief — situation or problem</label>
            <textarea
              id="brief"
              name="brief"
              placeholder="What is going on, what have you tried, and what do you want decided?"
            ></textarea>
            <div class="brief-actions">
              <button type="button" class="brief-action" id="btnBriefClear">
                Clear
              </button>
              <button type="button" class="brief-action" id="btnBriefRandom">
                Random brief
              </button>
            </div>
          </div>

          <button class="btn-start" id="btnStart" type="button">
            Start the council
          </button>
          <div
            class="error-msg"
            id="errorMsg"
            role="status"
            aria-live="polite"
          ></div>
        </form>
      </section>

      <section class="debate" aria-label="Strategy debate transcript">
        <div class="timeline" id="timeline"></div>
        <div class="session-usage" id="sessionUsage" hidden></div>
      </section>

      <button class="btn-reset" id="btnReset" type="button">New session</button>
    </main>

    <footer class="site-footer">
      <p>
        <a href="https://think2.xyz/">think2.xyz</a> — strategy debate in your
        browser.
      </p>
    </footer>

    <script>
      const OPENROUTER_ORIGIN = "https://openrouter.ai";
      const STORAGE_STRATEGIST = "think2.strategistModel";
      const STORAGE_CRITIC = "think2.criticModel";
      const STORAGE_SYNTHESIZER = "think2.synthesizerModel";
      const SESSION_MODEL_IDS = "think2.openrouterModelIds.v1";

      const SCROLL_BOTTOM_TOLERANCE_PX = 64;

      const SAMPLE_BRIEFS = [
        "I want to be more consistent at the gym (3×/week) but I break the streak whenever work gets busy. I've tried apps and strict plans; they don't stick. What strategy actually works for someone who's motivated but chaotic?",
        "I have a side project that's been 'almost ready' for months: it works for me, but I have no users. I work full-time and can spend maybe 6 hours a week on it. I keep tweaking code instead of talking to people. What should my next 30 days look like if I want real feedback, not more polishing?",
        "I'm a mid-level developer and my job is fine, but I feel stuck on growth. Updating my resume feels overwhelming and I avoid networking. I can interview when I get a chance, but I don't know how to pick the next role without jumping randomly. How should I spend the next 6 weeks?",
        "I'm saving for a used car in about a year, but I also want a modest vacation this summer. I have a small amount of debt I'm paying down. Income is steady but tight. How do I balance vacation, the car fund, and debt without feeling like I'm failing at all three?",
        "I paid for an online course six months ago and I've barely started. Evenings I'm tired and default to scrolling. I still want to finish it without burning out at my day job. What's a realistic weekly structure for the next month?",

      /** @type {Record<string, string>} */
      let history = {};
      /** @type {{ strategist: string; critic: string; synthesizer: string }} */
      let models = {

      function openRouterHeaders(apiKey) {
        return {
          Authorization: `Bearer ${apiKey}`,
          "Content-Type": "application/json",
          "HTTP-Referer": "https://think2.xyz",
          "X-OpenRouter-Title": "think2",
        };
      }

      function parseHttpErrorBody(text, status) {
        try {
          const j = JSON.parse(text);
          const msg = j.error?.message;
          if (typeof msg === "string" && msg.length > 0) return msg;
        } catch {
          /* ignore */
        }
        const t = text.trim();
        if (t.length > 0 && t.length < 400) return t;
        return `HTTP ${status}`;
      }

      function escapeHtml(str) {
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function showError(msg) {
        const el = document.getElementById("errorMsg");
        el.textContent = msg;
        el.style.display = "block";
      }

      function hideError() {
        document.getElementById("errorMsg").style.display = "none";
      }

      function presetValues() {
        return new Set(MODEL_PRESETS.map((p) => p.value));
      }

      function fillSelect(selectId, storageKey, fallbackValue) {
        const el = /** @type {HTMLSelectElement} */ (
          document.getElementById(selectId)
        );
        el.replaceChildren();
        for (const o of MODEL_PRESETS) {
          const opt = document.createElement("option");
          opt.value = o.value;
          opt.textContent = o.label;
          el.appendChild(opt);
        }
        const allowed = presetValues();
        const saved = localStorage.getItem(storageKey);
        if (saved && allowed.has(saved)) el.value = saved;
        else el.value = fallbackValue;
        el.addEventListener("change", () => {
          localStorage.setItem(storageKey, el.value);
        });
      }

      /**
       * @param {string} apiKey
       * @returns {Promise<Set<string>>}
       */
      async function fetchOpenRouterModelIds(apiKey) {
        const cached = sessionStorage.getItem(SESSION_MODEL_IDS);
        if (cached) {
          const parsed = JSON.parse(cached);
          if (Array.isArray(parsed) && parsed.every((x) => typeof x === "string"))
            return new Set(parsed);
        }

        const res = await fetch(`${OPENROUTER_ORIGIN}/api/v1/models`, {
          method: "GET",
          mode: "cors",
          headers: {
            Authorization: `Bearer ${apiKey}`,
          },
        });
        const text = await res.text();
        if (!res.ok) {
          throw new Error(parseHttpErrorBody(text, res.status));
        }
        let data;
        try {
          data = JSON.parse(text);
        } catch {
          throw new Error("Invalid JSON from OpenRouter models list.");
        }
        const rows = data.data;
        if (!Array.isArray(rows)) {
          throw new Error("Unexpected models response shape.");
        }
        const ids = rows
          .map((m) => m && typeof m.id === "string" && m.id)
          .filter(Boolean);
        if (ids.length === 0) {
          throw new Error("No models returned from OpenRouter.");
        }
        sessionStorage.setItem(SESSION_MODEL_IDS, JSON.stringify(ids));
        return new Set(ids);
      }

      /**
       * @param {Set<string>} idSet
       * @param {string[]} ids
       */
      function assertModelsKnown(idSet, ids) {
        const missing = ids.filter((id) => !idSet.has(id));
        if (missing.length > 0) {
          throw new Error(
            `Unknown or unavailable model for your key: ${missing.join(", ")}`,
          );
        }
      }

      /**
       * @param {string[]} ids
       */
      function assertModelIdFormat(ids) {
        for (const id of ids) {
          if (!MODEL_ID_RE.test(id)) {
            throw new Error(
              `Invalid model id format (expected provider/model): ${id}`,
            );
          }
        }
      }

      /**
       * @param {Element | null} root
       */
      function isDocumentPinnedToBottom(root) {
        if (!root) return true;
        const gap =
          root.scrollHeight - root.scrollTop - root.clientHeight;
        return gap <= SCROLL_BOTTOM_TOLERANCE_PX;
      }

      function pickRandomBrief() {
        const ta = document.getElementById("brief");
        const current = ta ? ta.value : "";
        if (SAMPLE_BRIEFS.length === 0) return "";
        let next = SAMPLE_BRIEFS[0];
        for (let i = 0; i < 8; i++) {
          next =
            SAMPLE_BRIEFS[
              Math.floor(Math.random() * SAMPLE_BRIEFS.length)
            ];
          if (next !== current || SAMPLE_BRIEFS.length === 1) break;
        }
        return next;
      }

      function createStreamRenderer(contentEl) {
        const textSpan = document.createElement("span");
        textSpan.className = "stream-text";
        const cursorSpan = document.createElement("span");
        cursorSpan.className = "cursor";
        contentEl.replaceChildren(textSpan, cursorSpan);

        let fullText = "";
        let raf = 0;
        let scrollRaf = 0;

        const flushText = () => {
          raf = 0;
          textSpan.textContent = fullText;
        };

        const flushScroll = () => {
          scrollRaf = 0;
          const root = document.scrollingElement;
          if (root && isDocumentPinnedToBottom(root)) {
            root.scrollTop = root.scrollHeight;
          }
        };

        return {
          push(chunk) {
            if (!chunk) return;
            fullText += chunk;
            if (raf === 0) raf = requestAnimationFrame(flushText);
            if (scrollRaf === 0)
              scrollRaf = requestAnimationFrame(flushScroll);
          },
          cancel() {
            if (raf !== 0) cancelAnimationFrame(raf);
            raf = 0;
            if (scrollRaf !== 0) cancelAnimationFrame(scrollRaf);
            scrollRaf = 0;
          },
          finish() {
            if (raf !== 0) cancelAnimationFrame(raf);
            raf = 0;
            if (scrollRaf !== 0) cancelAnimationFrame(scrollRaf);
            scrollRaf = 0;
            textSpan.textContent = fullText;
            contentEl.replaceChildren(textSpan);
            return fullText;
          },
        };
      }

      const usageMoneyFmt = new Intl.NumberFormat("en-US", {
        style: "currency",
        currency: "USD",
        minimumFractionDigits: 4,
        maximumFractionDigits: 6,
      });

      /**
       * @param {unknown} usage
       * @returns {{ prompt: number | null; completion: number | null; total: number | null; cost: number | null }}
       */
      function parseOpenRouterUsage(usage) {
        const empty = {
          prompt: null,
          completion: null,
          total: null,
          cost: null,
        };
        if (!usage || typeof usage !== "object") return empty;
        const o = /** @type {Record<string, unknown>} */ (usage);
        const readNum = (k) => {
          const v = o[k];
          return typeof v === "number" && Number.isFinite(v) ? v : null;
        };
        return {
          prompt: readNum("prompt_tokens"),
          completion: readNum("completion_tokens"),
          total: readNum("total_tokens"),
          cost: readNum("cost"),
        };
      }

      function usageHasAnyTokenOrCost(u) {
        return (
          u.prompt != null ||
          u.completion != null ||
          u.total != null ||
          u.cost != null
        );
      }

      /**
       * @param {{ prompt: number | null; completion: number | null; total: number | null; cost: number | null }} u
       * @returns {number | null}
       */
      function sessionTokenContribution(u) {
        if (u.total != null) return u.total;
        if (u.prompt != null && u.completion != null) return u.prompt + u.completion;
        return null;
      }

      /**
       * @param {HTMLElement} cardEl
       * @param {string} modelId
       * @param {{ prompt: number | null; completion: number | null; total: number | null; cost: number | null }} u
       */
      function mountRoundUsageFooter(cardEl, modelId, u) {
        const inner = cardEl.querySelector(".card-inner");
        if (!inner) return;

        const wrap = document.createElement("div");
        wrap.className = "round-usage";
        wrap.setAttribute("role", "status");

        const modelLine = document.createElement("span");
        modelLine.className = "usage-model";
        modelLine.textContent = modelId;

        const detail = document.createElement("span");

        if (!usageHasAnyTokenOrCost(u)) {
          detail.textContent = "Usage unavailable from API for this round.";
        } else {
          const parts = [];
          if (u.prompt != null) parts.push(`in ${u.prompt.toLocaleString()}`);
          if (u.completion != null)
            parts.push(`out ${u.completion.toLocaleString()}`);
          if (u.total != null) parts.push(`total ${u.total.toLocaleString()}`);
          let line = parts.join(" · ");
          if (u.cost != null) {
            line += ` · ${usageMoneyFmt.format(u.cost)}`;
          }
          detail.textContent = line;
        }

        wrap.appendChild(modelLine);
        wrap.appendChild(detail);
        inner.appendChild(wrap);
      }

      /**
       * @returns {{ tokensSum: number; tokenRounds: number; costSum: number; costRounds: number }}
       */
      function createEmptySessionUsageAgg() {
        return {
          tokensSum: 0,
          tokenRounds: 0,
          costSum: 0,
          costRounds: 0,
        };
      }

      /**
       * @param {{ tokensSum: number; tokenRounds: number; costSum: number; costRounds: number }} agg
       * @param {{ prompt: number | null; completion: number | null; total: number | null; cost: number | null }} u
       */
      function addUsageToSessionAgg(agg, u) {
        const tok = sessionTokenContribution(u);
        if (tok != null) {
          agg.tokensSum += tok;
          agg.tokenRounds += 1;
        }
        if (u.cost != null) {
          agg.costSum += u.cost;
          agg.costRounds += 1;
        }
      }

      /**
       * @param {{ tokensSum: number; tokenRounds: number; costSum: number; costRounds: number }} agg
       */
      function renderSessionUsageSummary(agg) {
        const el = document.getElementById("sessionUsage");
        if (!el) return;
        if (agg.tokenRounds === 0 && agg.costRounds === 0) {
          el.replaceChildren();
          el.hidden = true;
          return;
        }
        el.hidden = false;
        el.replaceChildren();
        const strong = document.createElement("strong");
        strong.textContent = "Session (OpenRouter)";
        el.appendChild(strong);
        const desc = document.createElement("p");
        desc.style.margin = "6px 0 0";
        const bits = [];
        if (agg.tokenRounds > 0) {
          bits.push(
            `Σ tokens (per-round total, summed): ${agg.tokensSum.toLocaleString()} (${agg.tokenRounds} rounds)`,
          );
        }
        if (agg.costRounds > 0) {
          bits.push(
            `Σ cost: ${usageMoneyFmt.format(agg.costSum)} (${agg.costRounds} rounds)`,
          );
        }
        desc.textContent = bits.join(" — ");
        el.appendChild(desc);
      }

      function clearSessionUsageSummary() {
        const el = document.getElementById("sessionUsage");
        if (!el) return;
        el.replaceChildren();
        el.hidden = true;
      }

      /**
       * @param {typeof ROUNDS[number]} round
       * @param {string} brief
       * @param {string} apiKey
       * @param {{ tokensSum: number; tokenRounds: number; costSum: number; costRounds: number }} sessionAgg
       * @returns {Promise<boolean>}
       */
      async function runRound(round, brief, apiKey, sessionAgg) {
        const card = document.createElement("div");
        card.className = `round-card ${round.cls} visible`;
        card.id = round.id;
        card.innerHTML = `
    <div class="card-inner">
      <div class="card-header">
        <span class="speaker-label">${escapeHtml(round.speaker)}</span>
        <span class="round-badge">${escapeHtml(round.label)}</span>
        <div class="typing-indicator" id="typing-${round.id}">
          <span></span><span></span><span></span>
        </div>
      </div>
      <div class="card-content" id="content-${round.id}"></div>
    </div>
  `;
        document.getElementById("timeline").appendChild(card);

        requestAnimationFrame(() => card.classList.add("animated"));
        if (isDocumentPinnedToBottom(document.scrollingElement)) {
          card.scrollIntoView({ behavior: "smooth", block: "end" });
        }

        const contentEl = document.getElementById(`content-${round.id}`);
        const typingEl = document.getElementById(`typing-${round.id}`);
        const model = models[round.modelKey];
        /** @type {ReturnType<typeof createStreamRenderer> | null} */
        let streamRef = null;

        try {
          const response = await fetch(
            `${OPENROUTER_ORIGIN}/api/v1/chat/completions`,
            {
              method: "POST",
              mode: "cors",
              headers: openRouterHeaders(apiKey),
              body: JSON.stringify({
                model,
                messages: [
                  { role: "system", content: round.system },
                  ...round.buildMessages(brief, history),
                ],
                stream: true,
                max_tokens: 2000,
              }),
            },
          );

          if (!response.ok) {
            const errText = await response.text();
            throw new Error(parseHttpErrorBody(errText, response.status));
          }

          typingEl.style.display = "none";
          streamRef = createStreamRenderer(contentEl);

          const reader = response.body?.getReader();
          if (!reader) {
            throw new Error("No response body to read.");
          }

          const decoder = new TextDecoder();
          let buffer = "";
          /** @type {unknown} */
          let lastUsageRaw = null;

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split("\n");
            buffer = lines.pop() ?? "";

            for (const line of lines) {
              const trimmed = line.trim();
              if (trimmed === "" || trimmed.startsWith(":")) continue;
              if (!trimmed.startsWith("data: ")) continue;
              const data = trimmed.slice(6);
              if (data === "[DONE]") break;
              let json;
              try {
                json = JSON.parse(data);
              } catch {
                continue;
              }
              if (json.usage && typeof json.usage === "object") {
                lastUsageRaw = json.usage;
              }
              const chunk = json.choices?.[0]?.delta?.content;
              if (typeof chunk === "string" && chunk.length > 0) {
                streamRef.push(chunk);
              }
            }
          }

          const fullText = streamRef.finish();
          streamRef = null;
          history[round.id] = fullText;
          const usageSnap = parseOpenRouterUsage(lastUsageRaw);
          mountRoundUsageFooter(card, model, usageSnap);
          addUsageToSessionAgg(sessionAgg, usageSnap);
          return true;
        } catch (err) {
          const message = err instanceof Error ? err.message : String(err);
          typingEl.style.display = "none";
          if (streamRef) {
            streamRef.cancel();
            streamRef = null;
          }
          contentEl.innerHTML = `<span class="stream-error">Error: ${escapeHtml(message)}</span>`;
          history[round.id] = "[error]";
          showError(`Round failed: ${message}`);
          return false;
        }
      }

      async function startCouncil() {
        const apiKey = document.getElementById("apiKey").value.trim();
        const brief = document.getElementById("brief").value.trim();
        const btnStart = document.getElementById("btnStart");

        if (!apiKey) return showError("Paste your OpenRouter API key first.");
        if (!brief) return showError("Write your brief first.");

        models.strategist = document.getElementById("strategistModel").value;
        models.critic = document.getElementById("criticModel").value;
        models.synthesizer = document.getElementById("synthesizerModel").value;

        const chosen = [
          models.strategist,
          models.critic,
          models.synthesizer,
        ];
        try {
          assertModelIdFormat(chosen);
        } catch (e) {
          const msg = e instanceof Error ? e.message : String(e);
          return showError(msg);
        }

        hideError();
        btnStart.disabled = true;
        document.getElementById("timeline").innerHTML = "";
        clearSessionUsageSummary();
        history = {};
        const sessionUsageAgg = createEmptySessionUsageAgg();

        let completed = false;
        try {
          const idSet = await fetchOpenRouterModelIds(apiKey);
          assertModelsKnown(idSet, chosen);

          for (const round of ROUNDS) {
            const ok = await runRound(round, brief, apiKey, sessionUsageAgg);
            if (!ok) return;
          }
          renderSessionUsageSummary(sessionUsageAgg);
          completed = true;
          document.getElementById("btnReset").style.display = "block";
        } catch (err) {
          const message = err instanceof Error ? err.message : String(err);
          showError(message);
        } finally {
          if (!completed) btnStart.disabled = false;
        }
      }

      function resetSession() {
        document.getElementById("timeline").innerHTML = "";
        clearSessionUsageSummary();
        document.getElementById("btnReset").style.display = "none";
        document.getElementById("btnStart").disabled = false;
        document.getElementById("brief").value = "";
        const apiKeyEl = document.getElementById("apiKey");
        apiKeyEl.type = "password";
        syncApiKeyToggleUi();
        history = {};
        hideError();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      document.getElementById("btnStart").addEventListener("click", startCouncil);
      document.getElementById("btnReset").addEventListener("click", resetSession);

      document.getElementById("btnBriefClear").addEventListener("click", () => {
        document.getElementById("brief").value = "";
      });
      document.getElementById("btnBriefRandom").addEventListener("click", () => {
        const briefEl = document.getElementById("brief");
        briefEl.value = pickRandomBrief();
        briefEl.focus();
        briefEl.setSelectionRange(briefEl.value.length, briefEl.value.length);
      });

      const API_KEY_TOGGLE_SVG = {
        eye: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>`,
        eyeOff: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg>`,
      };

      function syncApiKeyToggleUi() {
        const input = document.getElementById("apiKey");
        const btn = document.getElementById("btnApiKeyToggle");
        const masked = input.type === "password";
        btn.innerHTML = masked ? API_KEY_TOGGLE_SVG.eye : API_KEY_TOGGLE_SVG.eyeOff;
        btn.setAttribute("aria-pressed", masked ? "false" : "true");
        btn.setAttribute(
          "aria-label",
          masked ? "Show API key as plain text" : "Mask API key",
        );
        btn.title = masked ? "Show key" : "Mask key";
      }

      document.getElementById("btnApiKeyToggle").addEventListener("click", () => {
        const input = document.getElementById("apiKey");
        input.type = input.type === "password" ? "text" : "password";
        syncApiKeyToggleUi();
      });

      syncApiKeyToggleUi();

      fillSelect("strategistModel", STORAGE_STRATEGIST, "anthropic/claude-sonnet-4.6");
      fillSelect("criticModel", STORAGE_CRITIC, "google/gemini-2.5-pro");
      fillSelect(
        "synthesizerModel",
        STORAGE_SYNTHESIZER,
        "anthropic/claude-sonnet-4.6",
      );
    </script>
  </body>
</html>
