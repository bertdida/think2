<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="think2: describe your situation once. One AI proposes a plan, another challenges it, and a third turns the exchange into a clear verdict, next steps, and risks to watch for. Your OpenRouter API key is used only in this browser tab—it is not saved."
    />
    <meta name="robots" content="index,follow" />
    <meta
      name="theme-color"
      content="#f4f3f0"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#141414"
      media="(prefers-color-scheme: dark)"
    />
    <link rel="canonical" href="https://think2.xyz/" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://think2.xyz/" />
    <meta
      property="og:title"
      content="think2 — stress-tested advice, one clear verdict"
    />
    <meta
      property="og:description"
      content="think2: describe your situation once. One AI proposes a plan, another challenges it, and a third turns the exchange into a clear verdict, next steps, and risks to watch for. Your OpenRouter API key is used only in this browser tab—it is not saved."
    />
    <meta name="twitter:card" content="summary" />
    <meta
      name="twitter:title"
      content="think2 — stress-tested advice, one clear verdict"
    />
    <meta
      name="twitter:description"
      content="One AI plans, another pushes back, a third resolves it into verdict, actions, and risks. Your OpenRouter key never leaves the browser."
    />
    <title>think2 — stress-tested advice, one clear verdict</title>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "think2",
        "url": "https://think2.xyz/",
        "description": "Stress-tested recommendations: two AI models plan and challenge; a third resolves the exchange into a verdict, key actions, and risks. Uses the user's OpenRouter API key in the browser only.",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Web browser",
        "browserRequirements": "Requires JavaScript. User-supplied OpenRouter API key.",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    </script>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <h1>think2</h1>
        <nav class="header-links" aria-label="Site">
          <a class="header-github" href="demo.html">Demo</a>
          <a
            class="header-github"
            href="https://github.com/bertdida/think2"
            target="_blank"
            rel="noopener noreferrer"
            >GitHub</a
          >
        </nav>
      </div>
    </header>

    <main class="container" id="main">
      <section
        class="setup-panel"
        id="setupPanel"
        aria-labelledby="setup-heading"
      >
        <h2 id="setup-heading">Session setup</h2>
        <form id="debateForm" onsubmit="return false;">
          <div class="field">
            <label for="apiKey">OpenRouter API key</label>
            <div class="api-key-wrap">
              <input
                type="password"
                id="apiKey"
                name="apiKey"
                placeholder="sk-or-..."
                autocomplete="off"
                spellcheck="false"
              />
              <button
                type="button"
                class="api-key-toggle"
                id="btnApiKeyToggle"
                aria-pressed="false"
                aria-label="Show API key as plain text"
                title="Show key"
              ></button>
            </div>
            <p class="key-warning">
              Used only in this tab for OpenRouter. Not saved — gone after
              reload.
            </p>
          </div>

          <div class="models-row">
            <div class="field">
              <label for="strategistModel">Planner model</label>
              <select id="strategistModel" name="strategistModel"></select>
              <div class="model-tag s">Planner</div>
            </div>
            <div class="field">
              <label for="criticModel">Challenger model</label>
              <select id="criticModel" name="criticModel"></select>
              <div class="model-tag c">Challenger</div>
            </div>
          </div>

          <div class="field">
            <label for="synthesizerModel">Resolver model</label>
            <select id="synthesizerModel" name="synthesizerModel"></select>
            <div class="model-tag y">Final step — resolution</div>
          </div>

          <div class="field">
            <label for="brief">Your situation</label>
            <textarea
              id="brief"
              name="brief"
              placeholder="Describe what is going on, what you have tried, and what you want decided."
            ></textarea>
            <div class="brief-actions">
              <button type="button" class="brief-action" id="btnBriefClear">
                Clear
              </button>
              <button type="button" class="brief-action" id="btnBriefNext">
                Next sample
              </button>
            </div>
          </div>

          <button class="btn-start" id="btnStart" type="button">
            Get my recommendation
          </button>
          <div
            class="error-msg"
            id="errorMsg"
            role="status"
            aria-live="polite"
          ></div>
        </form>
      </section>

      <section class="debate" aria-label="How we got there">
        <div class="timeline" id="timeline"></div>
        <div class="session-usage" id="sessionUsage" hidden></div>
      </section>

      <button class="btn-reset" id="btnReset" type="button">New session</button>
    </main>

    <footer class="site-footer">
      <p>
        <a href="https://think2.xyz/">think2.xyz</a> — plan it, challenge it,
        resolve it. Stress-tested advice: a clear verdict and next steps.
      </p>
    </footer>

    <script type="module" src="/src/entries/index.ts"></script>
  </body>
</html>
